<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="3さいの女の子むけ ちびっこひろば">
<title>ちびっこひろば</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="../assets/icons/sticker-play.png">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background-size: cover; background-position: center; background-color: #fff2df;
    min-height: 100vh; box-sizing: border-box;
  }
  #hub-wrap { max-width: 640px; margin: 0 auto; padding: 28px 18px 40px; }
  #sticker-fab {
    position: fixed; top: 10px; right: 10px; z-index: 50;
    width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.9); font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,.2);
  }
  #cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
  .game-card {
    background: rgba(255,255,255,.92); border: none; border-radius: 28px; padding: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,.15); cursor: pointer; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .game-card img { width: 100%; height: 100%; object-fit: contain; }
  .game-card:active { transform: scale(.95); }
  .game-card.teaser { font-size: 2.6rem; background: linear-gradient(#fff6ec, #ffe6c4); }
  .game-card.emoji-card { font-size: 3.2rem; }
  @media (max-width: 380px) { #cards { gap: 14px; } }
  #unlock-overlay {
    position: fixed; inset: 0; z-index: 2000; display: none;
    align-items: center; justify-content: center; background: rgba(92,76,81,.5); padding: 20px;
  }
  #unlock-overlay.show { display: flex; }
  .unlock-card {
    background: #fff; border-radius: 32px; padding: 34px 26px; max-width: 340px; width: 100%;
    text-align: center; box-shadow: 0 14px 34px rgba(0,0,0,.3); cursor: pointer;
  }
  .unlock-card .unlock-emoji { font-size: 4rem; animation: unlock-pop .6s ease; }
  .unlock-card p { font-weight: 900; color: #ff6b35; font-size: 1.1rem; margin-top: 10px; }
  @keyframes unlock-pop {
    0% { transform: scale(.4); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<button id="sticker-fab" aria-label="シールちょう">📒</button>
<div id="hub-wrap">
  <div id="cards"></div>
</div>
<div id="unlock-overlay">
  <div class="unlock-card">
    <div class="unlock-emoji">🎁</div>
    <div id="unlock-emoji2" style="font-size:3rem;"></div>
    <p id="unlock-title"></p>
  </div>
</div>
<script type="module">
  import * as Voice from './core/voice.js';
  import * as sound from './core/sound.js';
  import * as Store from './core/store.js';
  import * as Confetti from './core/confetti.js';
  import { asset } from './core/paths.js';

  window.CHIBIKKO_ROOT = '../';

  document.body.addEventListener('pointerdown', () => {
    Voice.unlock();
    sound.resume();
  }, { once: true });

  document.body.style.backgroundImage = `url('${asset(Store.getSelectedTheme().file)}')`;

  document.getElementById('sticker-fab').addEventListener('click', () => {
    window.location.href = 'sticker-book.html';
  });

  const cardsEl = document.getElementById('cards');
  const res = await fetch('data/games.json');
  const { games, growthGames } = await res.json();
  games.forEach((g) => {
    const btn = document.createElement('button');
    btn.className = 'game-card';
    btn.innerHTML = `<img src="${asset(g.icon)}" alt="${g.title}" />`;
    btn.addEventListener('click', () => {
      Voice.speak(`game-${g.id}`);
      setTimeout(() => { window.location.href = g.path; }, 500);
    });
    cardsEl.appendChild(btn);
  });

  // Phase C1: 解放ゲーム本体（tasks/ちびっこキラキラ_バージョンアップ計画書.md 3章）。
  // 個別の解放条件を満たしたものだけ実カードにする。全部揃うまでは「予感」の🎁を残す。
  const unlockedGames = growthGames.filter((g) => Store.isGrowthGameUnlocked(g.id));
  const toCelebrate = unlockedGames.filter((g) => !Store.hasSeenUnlockCelebration(g.id));

  unlockedGames.forEach((g) => {
    const btn = document.createElement('button');
    btn.className = 'game-card emoji-card';
    btn.textContent = g.emoji;
    btn.setAttribute('aria-label', g.title);
    btn.addEventListener('click', () => {
      Voice.speak(`game-${g.id}`);
      setTimeout(() => { window.location.href = g.path; }, 500);
    });
    cardsEl.appendChild(btn);
  });

  if (unlockedGames.length < growthGames.length) {
    const teaser = document.createElement('button');
    teaser.className = 'game-card teaser';
    teaser.setAttribute('aria-label', 'つぎのあそび');
    teaser.textContent = '🎁';
    teaser.addEventListener('click', () => Voice.speak('growth-teaser'));
    cardsEl.appendChild(teaser);
  }

  // 「お姉さんになったから来た」を最大限演出する: 解放直後の初回訪問だけプレゼント箱の開封を見せる。
  function showNextCelebration() {
    if (!toCelebrate.length) return;
    const g = toCelebrate.shift();
    const overlay = document.getElementById('unlock-overlay');
    document.getElementById('unlock-emoji2').textContent = g.emoji;
    document.getElementById('unlock-title').textContent = '';
    overlay.classList.add('show');
    Confetti.burst();
    Voice.speak(`growth-unlock-${g.id}`);
    sound.play('coin');
    overlay.querySelector('.unlock-card').onclick = () => {
      overlay.classList.remove('show');
      Store.markUnlockCelebrationSeen(g.id);
      showNextCelebration();
    };
  }
  document.body.addEventListener('pointerdown', () => showNextCelebration(), { once: true });
</script>
</body>
</html>
