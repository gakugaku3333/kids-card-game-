<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>どっちのきもち</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; }
  body {
    background: linear-gradient(#fff0f5, #ffdcec);
    display: flex; align-items: flex-start; justify-content: center;
  }
  .game-wrap { width: 100%; max-width: 560px; padding: 90px 16px 24px; box-sizing: border-box; text-align: center; }
  .pick-emotion-scene { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; }
  #choices { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin-top: 10px; }
  .pick-choice.pick-image {
    width: 110px; height: 110px; border-radius: 50%; border: none; background: #fff;
    box-shadow: 0 6px 14px rgba(0,0,0,.15); cursor: pointer; padding: 8px;
  }
  .pick-choice.pick-image img { width: 100%; height: 100%; object-fit: contain; }
  .pick-choice.pick-correct { outline: 6px solid #ffd93d; transform: scale(1.08); }
  .pick-choice.pick-wrong { animation: shake .4s; }
  @keyframes shake { 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @media (max-height: 700px) {
    .game-wrap { padding-top: 70px; }
    .pick-emotion-scene { width: 150px; height: 150px; }
    .pick-choice.pick-image { width: 84px; height: 84px; }
  }
</style>
</head>
<body>
<script>window.CHIBIKKO_ROOT = '../../../';</script>
<div class="game-wrap">
  <div id="stage"></div>
  <div id="choices"></div>
</div>
<script type="module">
  import { ToddlerShell } from '../../core/shell.js';
  import { loadPick, PickEngine } from '../pick/engine.js';

  const shell = new ToddlerShell({ gameId: 'feelings' });
  const dom = { stageEl: document.getElementById('stage'), choicesEl: document.getElementById('choices') };

  const set = await loadPick('feelings');
  const engine = new PickEngine(shell, set, dom, {
    onFinish: (result) => shell.showResult(result)
  });
  shell.onRetry(() => engine.start());
  shell.autoStart({ greeting: 'start-feelings', onStart: () => engine.start() });
</script>
</body>
</html>
