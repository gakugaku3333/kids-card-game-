<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>おかたづけ</title>
<style>
  html, body { height: 100%; }
  body {
    background: linear-gradient(#fff6e0, #ffe9c2);
    display: flex; align-items: flex-start; justify-content: center;
  }
  .game-wrap { width: 100%; max-width: 520px; padding: 90px 16px 24px; box-sizing: border-box; }
  #items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
  .item-btn {
    aspect-ratio: 1; border-radius: 18px; border: none; background: #fff; cursor: pointer;
    box-shadow: 0 5px 10px rgba(0,0,0,.15); padding: 10px;
  }
  .item-btn img { width: 100%; height: 100%; object-fit: contain; }
  .item-btn.selected { outline: 5px solid #ffd93d; transform: scale(1.08); }
  .item-btn.gone { visibility: hidden; }
  #boxes { display: flex; justify-content: center; gap: 18px; }
  .box-btn {
    width: 140px; height: 120px; border-radius: 18px; border: none; background: #fff; cursor: pointer;
    box-shadow: 0 5px 10px rgba(0,0,0,.15); padding: 10px;
  }
  .box-btn img { width: 100%; height: 100%; object-fit: contain; }
  .box-btn.wrong { animation: shake .4s; }
  @keyframes shake { 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @media (max-height: 700px) {
    .game-wrap { padding-top: 70px; }
    .box-btn { width: 100px; height: 86px; }
  }
</style>
</head>
<body>
<script>window.CHIBIKKO_ROOT = '../../../';</script>
<div class="game-wrap">
  <div id="items"></div>
  <div id="boxes"></div>
</div>
<script type="module">
  import { ToddlerShell } from '../../core/shell.js';
  import { asset } from '../../core/paths.js';

  const shell = new ToddlerShell({ gameId: 'tidyup' });
  const itemsEl = document.getElementById('items');
  const boxesEl = document.getElementById('boxes');

  const ITEMS = [
    { id: 'ball', file: 'assets/tidyup/ball.png', category: 'omocha' },
    { id: 'kuma-nuigurumi', file: 'assets/tidyup/kuma-nuigurumi.png', category: 'omocha' },
    { id: 'tsumiki', file: 'assets/tidyup/tsumiki.png', category: 'omocha' },
    { id: 'gyunyu', file: 'assets/tidyup/gyunyu.png', category: 'tabemono' },
    { id: 'pan', file: 'assets/tidyup/pan.png', category: 'tabemono' },
    { id: 'ringo', file: 'assets/tidyup/ringo.png', category: 'tabemono' },
    { id: 'boushi', file: 'assets/tidyup/boushi.png', category: 'fuku' },
    { id: 'kutsushita', file: 'assets/tidyup/kutsushita.png', category: 'fuku' },
    { id: 'tshirt', file: 'assets/tidyup/tshirt.png', category: 'fuku' }
  ];
  const BOXES = [
    { id: 'omocha', file: 'assets/tidyup/box-omocha.png' },
    { id: 'tabemono', file: 'assets/tidyup/box-tabemono.png' },
    { id: 'fuku', file: 'assets/tidyup/box-fuku.png' }
  ];

  let selected = null;
  let putAway = 0;

  function render() {
    itemsEl.innerHTML = '';
    ITEMS.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = 'item-btn';
      btn.dataset.id = item.id;
      btn.innerHTML = `<img src="${asset(item.file)}" alt="${item.id}" />`;
      btn.addEventListener('click', () => onSelectItem(item, btn));
      itemsEl.appendChild(btn);
    });

    boxesEl.innerHTML = '';
    BOXES.forEach((box) => {
      const btn = document.createElement('button');
      btn.className = 'box-btn';
      btn.innerHTML = `<img src="${asset(box.file)}" alt="${box.id}" />`;
      btn.addEventListener('click', () => onTapBox(box, btn));
      boxesEl.appendChild(btn);
    });
  }

  function onSelectItem(item, btn) {
    if (btn.classList.contains('gone')) return;
    itemsEl.querySelectorAll('.item-btn').forEach((b) => b.classList.remove('selected'));
    btn.classList.add('selected');
    selected = { item, btn };
  }

  function onTapBox(box, boxBtn) {
    if (!selected) return;
    if (selected.item.category === box.id) {
      selected.btn.classList.add('gone');
      shell.sound.play('correct');
      shell.voice.praise();
      putAway++;
      selected = null;
      if (putAway >= ITEMS.length) {
        setTimeout(() => shell.showResult({ correct: ITEMS.length, total: ITEMS.length }), 900);
      }
    } else {
      boxBtn.classList.add('wrong');
      setTimeout(() => boxBtn.classList.remove('wrong'), 500);
      shell.sound.play('wrong');
      shell.voice.encourage();
    }
  }

  function startGame() {
    selected = null;
    putAway = 0;
    render();
  }

  shell.onRetry(() => startGame());
  shell.autoStart({ greeting: 'start-tidyup', onStart: () => startGame() });
</script>
</body>
</html>
