<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="10歳の女の子むけ キラキラひろば。挑戦・自己ベスト・収集をたのしむゲームひろば。">
  <title>キラキラひろば</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Zen Maru Gothic', 'M PLUS Rounded 1c', sans-serif;
      background: linear-gradient(160deg, #efe6ff 0%, #e2fbf3 60%, #ffffff 100%);
      min-height: 100vh; box-sizing: border-box;
    }
    #hub-wrap { max-width: 720px; margin: 0 auto; padding: 24px 18px 40px; }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-bottom: 18px;
    }
    h1 { font-size: 1.5rem; color: #5b4b8a; margin: 0; }
    h1 .star { color: #ff9ec7; }
    .token-badge {
      font-weight: 900; color: #5b4b8a; background: rgba(255,255,255,.85);
      border-radius: 50px; padding: 8px 16px; box-shadow: 0 3px 8px rgba(124,92,255,.18);
      white-space: nowrap;
    }
    #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
    .game-card {
      background: rgba(255,255,255,.92); border-radius: 24px; padding: 16px; text-align: center;
      text-decoration: none; color: #4a3f6b; box-shadow: 0 8px 18px rgba(124,92,255,.15);
      border: 2px solid #ecdcff;
    }
    .game-card:active { transform: scale(.97); }
    .game-card .thumb { font-size: 2.4rem; }
    .game-card .name { font-weight: 900; margin-top: 6px; display: block; }
    .empty-state {
      text-align: center; color: #9a8ac2; padding: 60px 20px; font-size: 1.05rem;
      grid-column: 1 / -1;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 10px; }

    .kira-modal { position: fixed; inset: 0; background: rgba(91,75,138,.45); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .kira-modal.show { display: flex; }
    .kira-modal-box { background: #fff; border-radius: 26px; padding: 26px 22px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 12px 30px rgba(91,75,138,.3); border: 3px solid #d9c8ff; }
    .kira-modal-box h3 { color: #7c5cff; margin: 4px 0 14px; }
    #nickname-input { font-family: inherit; font-size: 1.1rem; border: 2px solid #d9c8ff; border-radius: 14px; padding: 10px 14px; width: 100%; box-sizing: border-box; margin-bottom: 12px; text-align: center; }
    #nickname-input:focus { outline: none; border-color: #7c5cff; }

    .review-banner { display: none; background: linear-gradient(#fff0f8, #ffe6f4); border: 2px solid #ffc2e0; border-radius: 20px; padding: 14px; margin-bottom: 16px; text-decoration: none; color: #ff2f92; font-weight: 900; }
  </style>
</head>
<body>
<div id="hub-wrap">
  <header>
    <h1><span class="star">🌟</span> キラキラひろば</h1>
    <span class="token-badge">🌟 <span id="kiraTokens">0</span></span>
  </header>
  <a href="games/quiz/index.html?mode=fb-review" id="review-banner" class="review-banner">
    🔥 リベンジクエスト：おしかったもんだいが <span id="review-count">0</span>問！2ばいごほうびで ちょうせんしよう
  </a>
  <main id="cards"></main>
</div>

<div id="login-modal" class="kira-modal">
  <div class="kira-modal-box">
    <div style="font-size:2.6rem;">👋</div>
    <h3>はじめまして！</h3>
    <p style="color:#8a7ab0;">なまえを おしえてね</p>
    <input type="text" id="nickname-input" placeholder="なまえ（10もじまで）" maxlength="10" autocomplete="off">
    <button id="btn-login" class="kira-btn" style="font-family:inherit;font-weight:900;border:none;cursor:pointer;border-radius:22px;padding:12px 30px;font-size:1.1rem;color:#fff;background:linear-gradient(#a78bfa,#7c5cff);box-shadow:0 5px 0 #5b3fd6;">はじめる！ ✨</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script type="module">
  import * as Store from './core/store.js';
  import * as FireLog from './core/firelog.js';

  // マイルームで選んだかべがみを、ハブの背景にも反映する(「模様替えがハブに反映される」の軽量版)
  const WALLPAPER_BG = {
    wall_pink: 'linear-gradient(160deg, #ffe3f0 0%, #ffd6e8 60%, #ffffff 100%)',
    wall_star: 'linear-gradient(160deg, #2b2350 0%, #4a3f8a 60%, #efe6ff 100%)',
    wall_stripe: 'linear-gradient(160deg, #fff0f8 0%, #ffe6f4 40%, #efe6ff 60%, #ffe6f4 80%, #fff0f8 100%)',
    wall_castle: 'linear-gradient(160deg, #e6ddff 0%, #cbb8ff 60%, #efe6ff 100%)',
  };
  const wallpaper = Store.getRoomLayout().wallpaper;
  if (wallpaper && WALLPAPER_BG[wallpaper]) {
    document.body.style.background = WALLPAPER_BG[wallpaper];
  }

  document.getElementById('kiraTokens').textContent = Store.getTokens();
  document.addEventListener('kirakira-tokens-changed', () => {
    document.getElementById('kiraTokens').textContent = Store.getTokens();
  });

  const cardsEl = document.getElementById('cards');
  const res = await fetch('data/games.json');
  const { games } = await res.json();

  if (games.length === 0) {
    cardsEl.innerHTML =
      `<div class="empty-state"><div class="emoji">🌟</div>じゅんびちゅう！<br>あたらしいクエストが もうすぐ とうじょうするよ。</div>`;
  } else {
    games.forEach((g) => {
      const a = document.createElement('a');
      a.className = 'game-card';
      a.href = g.path;
      a.innerHTML = `<div class="thumb">${g.emoji || '🎮'}</div><span class="name">${g.title}</span>`;
      cardsEl.appendChild(a);
    });
  }

  function checkReviewDue() {
    FireLog.getReviewDue((items) => {
      const kiraItems = items.filter((i) => i.game && i.game.startsWith('kirakira-'));
      if (kiraItems.length > 0) {
        document.getElementById('review-count').textContent = String(kiraItems.length);
        document.getElementById('review-banner').style.display = 'block';
      }
    });
  }

  const loginModal = document.getElementById('login-modal');
  if (FireLog.getSavedUser()) {
    checkReviewDue();
  } else {
    loginModal.classList.add('show');
    setTimeout(() => document.getElementById('nickname-input').focus(), 150);
  }

  document.getElementById('btn-login').addEventListener('click', () => {
    const name = document.getElementById('nickname-input').value.trim();
    if (!name) { document.getElementById('nickname-input').focus(); return; }
    FireLog.setUser(name);
    loginModal.classList.remove('show');
    checkReviewDue();
  });
  document.getElementById('nickname-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });
</script>
</body>
</html>
