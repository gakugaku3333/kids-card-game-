<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="キラキラひろば「日本一周トラベル」。県庁所在地クエストで日本地図をぬりつぶそう。">
  <title>日本一周トラベル</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(160deg, #e6f2ff 0%, #e2fbf3 100%); min-height: 100vh; margin: 0; font-family: 'Zen Maru Gothic', sans-serif; }
    .game-container { max-width: 560px; margin: 0 auto; padding: 12px 18px 40px; text-align: center; }
    h1 { color: #2f78c4; margin-bottom: 4px; }
    .sub { color: #9a8ac2; margin-top: 0; }
    #start-screen, #play-screen { display: none; }
    #start-screen.active, #play-screen.active { display: block; }

    .menu-board { background: rgba(255,255,255,.85); border-radius: 20px; padding: 14px; margin: 16px 0; border: 2px solid #cfe0ff; }
    .menu-board h2 { font-size: 1rem; color: #2f78c4; margin: 0 0 6px; }
    .visit-count { color: #9a8ac2; font-size: .85rem; margin-bottom: 8px; }
    .pref-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 260px; overflow-y: auto; }
    .pref-item { background: #f0f6ff; border-radius: 10px; padding: 6px 2px; font-size: .68rem; color: #b8c4dc; }
    .pref-item.visited { background: linear-gradient(#d6ecff, #b9dcff); color: #2f78c4; font-weight: 900; }

    .start-btn { font-family: inherit; font-weight: 900; border: none; cursor: pointer; border-radius: 22px; padding: 16px 34px; font-size: 1.2rem; color: #fff; background: linear-gradient(#7fa9ff, #2f78c4); box-shadow: 0 5px 0 #1c5590; margin-top: 8px; }

    .quiz-meta { display: flex; justify-content: space-around; font-weight: 900; color: #5b4b8a; margin: 10px 0 20px; }
    .question { font-size: 1.4rem; font-weight: 900; margin: 20px 0 8px; color: #4a3f6b; }
    .choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .choice-btn { font-family: inherit; font-size: 1.2rem; font-weight: 900; border: none; border-radius: 18px; padding: 18px; background: #fff; box-shadow: 0 4px 0 rgba(0,0,0,.1); cursor: pointer; }
    .choice-btn.correct { background: #c8f7d6; }
    .choice-btn.wrong { background: #ffd6d6; opacity: .6; }
    .choice-btn:disabled { cursor: default; }
    .feedback { min-height: 1.6rem; font-size: 1.2rem; font-weight: 900; margin-top: 14px; }
    .feedback.correct { color: #38c172; }
    .feedback.wrong { color: #e3342f; }
  </style>
</head>
<body>
  <div class="game-container">
    <section id="start-screen">
      <h1>🗾 日本一周トラベル</h1>
      <p class="sub">県庁所在地クエストに こたえて、日本地図の 訪問マップを ぬりつぶそう！</p>
      <div class="menu-board">
        <h2>🧭 訪問マップ</h2>
        <div class="visit-count"><span id="visit-count">0</span>/47 けん 訪問ずみ</div>
        <div id="pref-grid" class="pref-grid"></div>
      </div>
      <button id="btn-start" class="start-btn">たびに でる！</button>
    </section>

    <section id="play-screen">
      <div class="quiz-meta">
        <span>せいかい: <span id="stat-correct">0</span></span>
        <span>もんだい: <span id="stat-num">1</span>/<span id="stat-total">8</span></span>
      </div>
      <div class="question" id="question-display">?</div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script type="module">
    import { KiraShell } from '../../core/shell.js';
    import * as Store from '../../core/store.js';
    import { loadQuiz, KiraQuizEngine } from '../quiz/engine.js';
    import { showUnlockToast } from '../../core/questSkin.js';

    const GAME_ID = 'kirakira-travel';
    const ALL_PREFS = [
      '北海道', '青森県', '岩手県', '宮城県', '秋田県', '山形県', '福島県',
      '茨城県', '栃木県', '群馬県', '埼玉県', '千葉県', '東京都', '神奈川県',
      '新潟県', '富山県', '石川県', '福井県', '山梨県', '長野県',
      '岐阜県', '静岡県', '愛知県', '三重県',
      '滋賀県', '京都府', '大阪府', '兵庫県', '奈良県', '和歌山県',
      '鳥取県', '島根県', '岡山県', '広島県', '山口県',
      '徳島県', '香川県', '愛媛県', '高知県',
      '福岡県', '佐賀県', '長崎県', '熊本県', '大分県', '宮崎県', '鹿児島県', '沖縄県'
    ];

    const startScreen = document.getElementById('start-screen');
    const playScreen = document.getElementById('play-screen');
    function showScreen(el) {
      [startScreen, playScreen].forEach((s) => s.classList.remove('active'));
      el.classList.add('active');
    }

    function renderMap() {
      const visited = Store.getQuestProgress(GAME_ID).unlockedItems || [];
      document.getElementById('visit-count').textContent = String(visited.length);
      document.getElementById('pref-grid').innerHTML = ALL_PREFS.map((p) => {
        const has = visited.indexOf(p) !== -1;
        return `<div class="pref-item${has ? ' visited' : ''}">${p.replace(/[都道府県]$/, '')}</div>`;
      }).join('');
    }
    renderMap();

    const dom = {
      questionEl: document.getElementById('question-display'),
      promptEl: { set textContent(v) {} },
      choicesEl: document.getElementById('choices'),
      feedbackEl: document.getElementById('feedback'),
      statCorrectEl: document.getElementById('stat-correct'),
      statNumEl: document.getElementById('stat-num'),
      statTotalEl: document.getElementById('stat-total')
    };

    const quiz = await loadQuiz(GAME_ID);
    const shell = new KiraShell({ gameId: quiz.id, title: '🗾 日本一周トラベル' });

    const engine = new KiraQuizEngine(shell, quiz, dom, {
      onCorrect(problem) {
        if (problem.meta && problem.meta.pref) {
          const isNew = Store.unlockQuestItem(GAME_ID, problem.meta.pref);
          if (isNew) {
            showUnlockToast({ emoji: '🗺️', name: `${problem.meta.pref} を 訪問した！` });
            renderMap();
          }
        }
      },
      onReviewOffer() {
        engine.callbacks.onFinish({ correct: engine.correct, total: engine.total, tokens: engine.tokens });
      },
      onFinish(result) {
        shell.showResult(result);
      }
    });
    shell.onRetry(() => { showScreen(startScreen); });

    document.getElementById('btn-start').addEventListener('click', () => {
      showScreen(playScreen);
      shell.startGame(() => engine.startLevel(0));
    });

    showScreen(startScreen);
  </script>
</body>
</html>
