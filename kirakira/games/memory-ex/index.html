<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しんけいすいじゃくEX（キラキラひろば）</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  body { background: linear-gradient(160deg, #efe6ff 0%, #e2fbf3 100%); min-height: 100vh; margin: 0; }
  .game-container { max-width: 560px; margin: 0 auto; padding: 12px 18px 40px; text-align: center; box-sizing: border-box; }
  #level-screen, #play-screen { display: none; }
  #level-screen.active, #play-screen.active { display: block; }

  .lead { font-size: 1.05rem; font-weight: 700; color: #5b4b8a; line-height: 1.7; margin: 10px 0 22px; }
  .level-btn {
    font-family: inherit; font-weight: 900; border: none; cursor: pointer;
    display: block; width: 100%; max-width: 320px; margin: 12px auto;
    border-radius: 22px; padding: 16px 20px; font-size: 1.2rem; color: #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,.18); transition: transform .08s;
  }
  .level-btn:active { transform: translateY(4px); box-shadow: none; }
  .level-btn small { display: block; font-size: .82rem; font-weight: 700; opacity: .9; }
  .lv-easy { background: linear-gradient(#7fe8d4, #4fd6bd); box-shadow: 0 5px 0 #2fae98; }
  .lv-normal { background: linear-gradient(#a78bfa, #7c5cff); box-shadow: 0 5px 0 #5b3fd6; }
  .lv-hard { background: linear-gradient(#ff9fc9, #ff6bb0); box-shadow: 0 5px 0 #d94886; }

  .hud { display: flex; gap: 10px; margin-bottom: 12px; }
  .hud-box { background: rgba(255,255,255,.9); border-radius: 16px; padding: 6px 4px; flex: 1; box-shadow: 0 4px 0 rgba(0,0,0,.08); }
  .hud-label { font-size: .74rem; color: #9a8ac2; font-weight: 700; display: block; }
  .hud-value { font-size: 1.2rem; font-weight: 900; color: #4a3f6b; }

  .board { display: grid; gap: 8px; justify-content: center; }
  .card {
    width: 100%; aspect-ratio: 1; position: relative; cursor: pointer;
    perspective: 600px;
  }
  .card-inner {
    position: absolute; inset: 0; border-radius: 12px; transition: transform .35s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 12px; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
  .card-back { background: linear-gradient(#a78bfa, #7c5cff); box-shadow: 0 4px 0 #5b3fd6; }
  .card-back::after { content: '✨'; font-size: 1.2rem; opacity: .8; }
  .card-front { background: #fff; box-shadow: 0 4px 0 rgba(0,0,0,.08); transform: rotateY(180deg); font-size: 1.6rem; }
  .card.matched .card-front { background: #e8ffe0; }
  .card.shake .card-inner { animation: mx-shake .3s ease; }
  @keyframes mx-shake { 0%,100% { transform: rotateY(180deg) translateX(0); } 25% { transform: rotateY(180deg) translateX(-6px); } 75% { transform: rotateY(180deg) translateX(6px); } }

  @media (max-height: 700px) {
    .hud { margin-bottom: 8px; }
    .board { gap: 6px; }
  }
</style>
</head>
<body>
<div class="game-container">
  <section id="level-screen" class="active">
    <div style="font-size:2.6rem; margin-top:6px;">🃏✨</div>
    <p class="lead">おなじ カードを 2まい めくって そろえよう！<br>てすうが すくないほど じこベスト。</p>
    <button class="level-btn lv-easy" data-level="easy">やさしい<small>24まい（12ペア）</small></button>
    <button class="level-btn lv-normal" data-level="normal">ふつう<small>30まい（15ペア）</small></button>
    <button class="level-btn lv-hard" data-level="hard">むずかしい<small>36まい（18ペア）</small></button>
  </section>

  <section id="play-screen">
    <div class="hud">
      <div class="hud-box"><span class="hud-label">ペア</span><span class="hud-value" id="hud-pairs">0/12</span></div>
      <div class="hud-box"><span class="hud-label">てすう</span><span class="hud-value" id="hud-moves">0</span></div>
      <div class="hud-box"><span class="hud-label">ミス</span><span class="hud-value" id="hud-miss">0</span></div>
    </div>
    <div class="board" id="board"></div>
  </section>
</div>

<script type="module">
  import { KiraShell } from '../../core/shell.js';

  const shell = new KiraShell({ gameId: 'memory-ex', title: 'しんけいすいじゃくEX' });

  const EMOJI = ['🍰', '🍓', '🍩', '🎀', '👑', '💎', '🦄', '🌈', '✨', '💗', '🍭', '🧁', '🍮', '🍬', '🌸', '🦋', '🎠', '🩰', '🧸', '👛'];
  const LEVELS = { easy: { pairs: 12, cols: 4 }, normal: { pairs: 15, cols: 5 }, hard: { pairs: 18, cols: 6 } };
  const TOKENS_PER_LEVEL = { easy: 5, normal: 8, hard: 12 };

  const board = document.getElementById('board');
  const hudPairs = document.getElementById('hud-pairs');
  const hudMoves = document.getElementById('hud-moves');
  const hudMiss = document.getElementById('hud-miss');
  const levelScreen = document.getElementById('level-screen');
  const playScreen = document.getElementById('play-screen');

  let level = 'easy';
  let totalPairs = 12;
  let matchedPairs = 0;
  let moves = 0;
  let miss = 0;
  let first = null, second = null;
  let locked = false;

  function shuffled(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function updateHud() {
    hudPairs.textContent = `${matchedPairs}/${totalPairs}`;
    hudMoves.textContent = String(moves);
    hudMiss.textContent = String(miss);
  }

  function buildBoard() {
    const config = LEVELS[level];
    totalPairs = config.pairs;
    const chosen = shuffled(EMOJI).slice(0, totalPairs);
    const deck = shuffled(chosen.concat(chosen));
    board.style.gridTemplateColumns = `repeat(${config.cols}, minmax(0, 1fr))`;
    board.style.maxWidth = `${config.cols * 76}px`;
    board.innerHTML = '';
    deck.forEach((emoji, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = idx;
      card.dataset.emoji = emoji;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => onCardClick(card));
      board.appendChild(card);
    });
  }

  function onCardClick(card) {
    if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    card.classList.add('flipped');
    if (!first) { first = card; return; }
    second = card;
    locked = true;
    moves++;
    updateHud();
    if (first.dataset.emoji === second.dataset.emoji) {
      setTimeout(() => {
        first.classList.add('matched');
        second.classList.add('matched');
        matchedPairs++;
        updateHud();
        shell.sound.play('correct');
        first = null; second = null; locked = false;
        if (matchedPairs === totalPairs) onClear();
      }, 250);
    } else {
      miss++;
      updateHud();
      setTimeout(() => {
        first.classList.add('shake');
        second.classList.add('shake');
        shell.sound.play('wrong');
      }, 150);
      setTimeout(() => {
        first.classList.remove('flipped', 'shake');
        second.classList.remove('flipped', 'shake');
        first = null; second = null; locked = false;
      }, 950);
    }
  }

  function onClear() {
    setTimeout(() => {
      shell.showResult({ correct: totalPairs, total: totalPairs, tokens: TOKENS_PER_LEVEL[level], moves, movesLabel: 'てすう' });
    }, 500);
  }

  function play() {
    matchedPairs = 0; moves = 0; miss = 0; first = null; second = null; locked = false;
    levelScreen.classList.remove('active');
    playScreen.classList.add('active');
    buildBoard();
    updateHud();
  }

  document.querySelectorAll('.level-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      level = btn.dataset.level;
      shell.startGame(play);
    });
  });

  shell.onRetry(() => {
    playScreen.classList.remove('active');
    levelScreen.classList.add('active');
  });
</script>
</body>
</html>
