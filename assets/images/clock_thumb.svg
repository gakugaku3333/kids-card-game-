<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="csky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="1" stop-color="#ffe6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="20" fill="url(#csky)"/>
  <!-- bells -->
  <circle cx="130" cy="55" r="20" fill="#ffb347"/>
  <circle cx="270" cy="55" r="20" fill="#ffb347"/>
  <rect x="118" y="30" width="24" height="10" rx="5" fill="#ff9a3d" transform="rotate(-25 130 55)"/>
  <rect x="258" y="30" width="24" height="10" rx="5" fill="#ff9a3d" transform="rotate(25 270 55)"/>
  <!-- feet -->
  <rect x="150" y="205" width="18" height="24" rx="6" fill="#ff9a3d"/>
  <rect x="232" y="205" width="18" height="24" rx="6" fill="#ff9a3d"/>
  <!-- clock body -->
  <circle cx="200" cy="140" r="95" fill="#ffb347" stroke="#e07e22" stroke-width="6"/>
  <circle cx="200" cy="140" r="72" fill="#fffdf7"/>
  <!-- numbers (12,3,6,9) -->
  <text x="200" y="82" text-anchor="middle" font-size="20" font-weight="900" fill="#5c4c51" font-family="sans-serif">12</text>
  <text x="258" y="148" text-anchor="middle" font-size="20" font-weight="900" fill="#5c4c51" font-family="sans-serif">3</text>
  <text x="200" y="210" text-anchor="middle" font-size="20" font-weight="900" fill="#5c4c51" font-family="sans-serif">6</text>
  <text x="142" y="148" text-anchor="middle" font-size="20" font-weight="900" fill="#5c4c51" font-family="sans-serif">9</text>
  <!-- hands pointing ~10:10 (happy face expression) -->
  <line x1="200" y1="140" x2="175" y2="105" stroke="#5c4c51" stroke-width="7" stroke-linecap="round"/>
  <line x1="200" y1="140" x2="230" y2="102" stroke="#ff7ebb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="200" cy="140" r="7" fill="#5c4c51"/>
  <!-- smiling face -->
  <circle cx="178" cy="128" r="4" fill="#5c4c51"/>
  <circle cx="222" cy="128" r="4" fill="#5c4c51"/>
  <path d="M178 168 Q200 186 222 168" stroke="#ff8c2b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- top button -->
  <rect x="190" y="18" width="20" height="16" rx="6" fill="#e07e22"/>
</svg>
