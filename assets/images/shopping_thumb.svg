<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="ssky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0f5"/>
      <stop offset="1" stop-color="#e6f2ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="20" fill="url(#ssky)"/>
  <!-- basket -->
  <path d="M110 140 L290 140 L270 220 Q200 235 130 220 Z" fill="#e0a35c" stroke="#a9713a" stroke-width="4"/>
  <path d="M150 140 Q200 90 250 140" fill="none" stroke="#a9713a" stroke-width="10" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="140" y2="215" stroke="#a9713a" stroke-width="4"/>
  <line x1="200" y1="150" x2="200" y2="222" stroke="#a9713a" stroke-width="4"/>
  <line x1="250" y1="150" x2="260" y2="215" stroke="#a9713a" stroke-width="4"/>
  <!-- fruits popping out -->
  <circle cx="150" cy="120" r="26" fill="#ff6b6b"/>
  <rect x="146" y="90" width="8" height="18" rx="4" fill="#5a8a3a"/>
  <circle cx="210" cy="105" r="24" fill="#ffd54a"/>
  <circle cx="265" cy="122" r="22" fill="#ff9ec7"/>
  <!-- coin -->
  <circle cx="320" cy="190" r="34" fill="#ffe08a" stroke="#e0a300" stroke-width="5"/>
  <text x="320" y="200" text-anchor="middle" font-size="26" font-weight="900" fill="#8a6a10" font-family="sans-serif">¥</text>
  <!-- price tag -->
  <g transform="translate(60 175) rotate(-15)">
    <rect x="0" y="0" width="46" height="30" rx="6" fill="#fff" stroke="#ff7ebb" stroke-width="4"/>
    <circle cx="10" cy="10" r="3" fill="#ff7ebb"/>
  </g>
</svg>
