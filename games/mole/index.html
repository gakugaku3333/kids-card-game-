<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="子供向けのかわいいもぐらたたきゲーム。タップしてもぐらをたたこう！">
  <title>もぐらたたき！</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/images/favicon-16x16.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: linear-gradient(160deg, #b8e6c9 0%, #8fd9c0 50%, #6fcfb0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      overflow-y: auto;
      padding: 18px;
      color: #4a3f3a;
      user-select: none;
      -webkit-user-select: none;
    }
    .game-container { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; }
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    h1.title { font-weight: 900; font-size: 2.4rem; color: #fff; text-shadow: 0 3px 0 #4caf8a, 0 6px 8px rgba(0,0,0,.18); margin: 14px 0 6px; text-align: center; }
    .subtitle { font-size: 1.05rem; color: #2f6b58; font-weight: 700; margin-bottom: 22px; text-align: center; }

    .btn {
      font-family: inherit; font-weight: 900; border: none; cursor: pointer;
      border-radius: 22px; padding: 16px 34px; font-size: 1.3rem; color: #fff;
      background: linear-gradient(#ffb347, #ff9a3d); box-shadow: 0 5px 0 #e07e22, 0 8px 12px rgba(0,0,0,.18);
      transition: transform .08s, box-shadow .08s; margin: 8px;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #e07e22, 0 3px 6px rgba(0,0,0,.18); }
    .btn.secondary { background: linear-gradient(#9bd4ff, #6bb8f5); box-shadow: 0 5px 0 #4a90d9, 0 8px 12px rgba(0,0,0,.18); }
    .btn.secondary:active { box-shadow: 0 1px 0 #4a90d9; }

    .mole-emoji { font-size: 3.4rem; }

    .hud { display: flex; gap: 12px; width: 100%; justify-content: space-between; margin-bottom: 14px; }
    .hud-box { background: #fff; border-radius: 18px; padding: 10px 8px; flex: 1; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,.08); }
    .hud-label { font-size: .8rem; color: #8a9; font-weight: 700; display: block; }
    .hud-value { font-size: 1.5rem; font-weight: 900; color: #4a3f3a; }
    #hud-time.warn .hud-value { color: #e05656; }

    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; aspect-ratio: 1 / 1; }
    .hole {
      background: radial-gradient(ellipse at 50% 38%, #6b4a2f 0%, #543822 60%, #3d2817 100%);
      border-radius: 50%; position: relative; overflow: hidden; cursor: pointer;
      box-shadow: inset 0 -8px 14px rgba(0,0,0,.4), 0 4px 0 #4a8c70;
    }
    .hole::after { /* 地面のふち */
      content: ''; position: absolute; left: -6%; right: -6%; bottom: -2%; height: 36%;
      background: linear-gradient(#9bd99f, #7ac98a); border-radius: 50%; z-index: 1;
    }
    .critter {
      position: absolute; left: 50%; bottom: 4%; transform: translate(-50%, 110%);
      font-size: clamp(2rem, 13vw, 3.6rem); transition: transform .12s ease-out; z-index: 2; pointer-events: none;
    }
    .hole.up .critter { transform: translate(-50%, 6%); }
    .hole.bonk .critter { transform: translate(-50%, 30%) scale(.7) rotate(-12deg); opacity: .5; }
    .hit-float {
      position: absolute; left: 50%; top: 10%; transform: translateX(-50%);
      font-weight: 900; font-size: 1.4rem; z-index: 5; pointer-events: none;
      animation: floatUp .6s ease-out forwards;
    }
    @keyframes floatUp { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, -40px); } }

    /* 結果モーダル */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: center; justify-content: center; padding: 18px; }
    .modal.show { display: flex; }
    .modal-card { background: #fff; border-radius: 28px; padding: 30px 26px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,.3); animation: pop .35s cubic-bezier(.2,1.4,.5,1); }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-card h2 { font-size: 1.9rem; color: #ff8c2b; margin-bottom: 6px; }
    .modal-emoji { font-size: 3.6rem; }
    .result-row { display: flex; justify-content: space-around; margin: 16px 0; }
    .result-item { background: #fff6ec; border-radius: 16px; padding: 12px 10px; flex: 1; margin: 0 5px; }
    .result-item .r-label { font-size: .78rem; color: #b09; opacity: .7; display: block; }
    .result-item .r-label { color: #a98; }
    .result-item .r-value { font-size: 1.5rem; font-weight: 900; color: #4a3f3a; }
    .home-link { display: inline-block; margin-top: 14px; text-decoration: none; }

    @media (max-height: 700px) {
      body { justify-content: flex-start; }
      h1.title { font-size: 1.8rem; margin: 6px 0 4px; }
      .subtitle { margin-bottom: 12px; }
      .mole-emoji { font-size: 2.4rem; }
      .board { max-width: 62vh; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- スタート画面 -->
    <section id="start-screen" class="screen active">
      <div class="mole-emoji">🐹</div>
      <h1 class="title">もぐらたたき！</h1>
      <p class="subtitle">あなから でてくる もぐらを<br>タップして やっつけよう！<br>💣ばくだんは たたいちゃ だめだよ</p>
      <button id="btn-start" class="btn">スタート！</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </section>

    <!-- プレイ画面 -->
    <section id="play-screen" class="screen">
      <div class="hud">
        <div class="hud-box"><span class="hud-label">てんすう</span><span id="hud-score" class="hud-value">0</span></div>
        <div class="hud-box" id="hud-time"><span class="hud-label">のこり</span><span id="hud-timer" class="hud-value">30</span></div>
      </div>
      <div id="board" class="board"></div>
    </section>
  </div>

  <!-- 結果モーダル -->
  <div id="result-modal" class="modal">
    <div class="modal-card">
      <div class="modal-emoji">🎉</div>
      <h2>おわり！</h2>
      <div class="result-row">
        <div class="result-item"><span class="r-label">てんすう</span><span id="r-score" class="r-value">0</span></div>
        <div class="result-item"><span class="r-label">ゲット⭐</span><span id="r-tokens" class="r-value">0</span></div>
      </div>
      <button id="btn-again" class="btn">もういちど あそぶ</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </div>
  </div>

  <script src="../../js/store.js"></script>
  <script>
  (function () {
    'use strict';
    var GAME_TIME = 30;
    var board = document.getElementById('board');
    var holes = [];
    var score = 0, timeLeft = GAME_TIME;
    var spawnTimer = null, countdownTimer = null, running = false;

    // 9個の穴をつくる
    for (var i = 0; i < 9; i++) {
      var hole = document.createElement('div');
      hole.className = 'hole';
      var critter = document.createElement('span');
      critter.className = 'critter';
      hole.appendChild(critter);
      hole.dataset.index = i;
      hole.addEventListener('pointerdown', onHit);
      board.appendChild(hole);
      holes.push({ el: hole, critter: critter, type: null });
    }

    function onHit(e) {
      if (!running) return;
      var idx = +this.dataset.index;
      var h = holes[idx];
      if (!h.type) return;                 // 何も出ていない穴
      if (this.classList.contains('bonk')) return; // 既にたたいた
      if (h.type === 'mole') {
        score += 1;
        showFloat(this, '+1', '#3aa76d');
      } else { // bomb
        score = Math.max(0, score - 2);
        showFloat(this, '-2', '#e05656');
      }
      this.classList.add('bonk');
      this.classList.remove('up');
      h.type = null;
      updateScore();
    }

    function showFloat(holeEl, text, color) {
      var f = document.createElement('span');
      f.className = 'hit-float';
      f.textContent = text;
      f.style.color = color;
      holeEl.appendChild(f);
      setTimeout(function () { f.remove(); }, 600);
    }

    function updateScore() { document.getElementById('hud-score').textContent = score; }

    function popUp() {
      // 空いている穴を集める
      var free = holes.filter(function (h) { return !h.type && !h.el.classList.contains('up'); });
      if (!free.length) return;
      var h = free[Math.floor(Math.random() * free.length)];
      var isBomb = Math.random() < 0.25; // 25%で爆弾
      h.type = isBomb ? 'bomb' : 'mole';
      h.critter.textContent = isBomb ? '💣' : (Math.random() < 0.5 ? '🐹' : '🐭');
      h.el.classList.remove('bonk');
      h.el.classList.add('up');
      var stay = 700 + Math.random() * 700;
      setTimeout(function () { hideHole(h); }, stay);
    }

    function hideHole(h) {
      h.el.classList.remove('up');
      // 引っ込んだ後に当たり判定を消す
      setTimeout(function () { h.type = null; h.el.classList.remove('bonk'); }, 150);
    }

    function startGame() {
      clearInterval(spawnTimer); clearInterval(countdownTimer); // 念のため前回ぶんを掃除
      score = 0; timeLeft = GAME_TIME; running = true;
      updateScore();
      document.getElementById('hud-timer').textContent = timeLeft;
      document.getElementById('hud-time').classList.remove('warn');
      show('play-screen');

      var spawnDelay = 850;
      spawnTimer = setInterval(function () {
        popUp();
        if (Math.random() < 0.3) setTimeout(popUp, 250); // たまに2匹
      }, spawnDelay);

      countdownTimer = setInterval(function () {
        timeLeft--;
        document.getElementById('hud-timer').textContent = timeLeft;
        if (timeLeft <= 5) document.getElementById('hud-time').classList.add('warn');
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      running = false;
      clearInterval(spawnTimer);
      clearInterval(countdownTimer);
      holes.forEach(function (h) { h.el.classList.remove('up', 'bonk'); h.type = null; });

      var earned = Math.ceil(score / 5);
      if (earned > 0 && window.Store) window.Store.addTokens(earned);
      document.getElementById('r-score').textContent = score;
      document.getElementById('r-tokens').textContent = earned;
      document.getElementById('result-modal').classList.add('show');
    }

    function show(id) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-again').addEventListener('click', function () {
      document.getElementById('result-modal').classList.remove('show');
      startGame();
    });
  })();
  </script>
</body>
</html>
