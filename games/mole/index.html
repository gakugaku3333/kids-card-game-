<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="子供向けのかわいいもぐらたたきゲーム。タップしてもぐらをたたこう！ふたりで対戦もできるよ。">
  <title>もぐらたたき！</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/images/favicon-16x16.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    html, body { height: 100%; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: linear-gradient(160deg, #b8e6c9 0%, #8fd9c0 50%, #6fcfb0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      overflow-y: auto;
      padding: 18px;
      color: #4a3f3a;
      user-select: none;
      -webkit-user-select: none;
    }
    .game-container { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; }
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    h1.title { font-weight: 900; font-size: 2.4rem; color: #fff; text-shadow: 0 3px 0 #4caf8a, 0 6px 8px rgba(0,0,0,.18); margin: 14px 0 6px; text-align: center; }
    .subtitle { font-size: 1.05rem; color: #2f6b58; font-weight: 700; margin-bottom: 22px; text-align: center; }

    .btn {
      font-family: inherit; font-weight: 900; border: none; cursor: pointer;
      border-radius: 22px; padding: 16px 34px; font-size: 1.3rem; color: #fff;
      background: linear-gradient(#ffb347, #ff9a3d); box-shadow: 0 5px 0 #e07e22, 0 8px 12px rgba(0,0,0,.18);
      transition: transform .08s, box-shadow .08s; margin: 8px;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #e07e22, 0 3px 6px rgba(0,0,0,.18); }
    .btn.secondary { background: linear-gradient(#9bd4ff, #6bb8f5); box-shadow: 0 5px 0 #4a90d9, 0 8px 12px rgba(0,0,0,.18); }
    .btn.secondary:active { box-shadow: 0 1px 0 #4a90d9; }

    .mole-emoji { font-size: 3.4rem; }

    .hud { display: flex; gap: 12px; width: 100%; justify-content: space-between; margin-bottom: 14px; }
    .hud-box { background: #fff; border-radius: 18px; padding: 10px 8px; flex: 1; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,.08); }
    .hud-label { font-size: .8rem; color: #8a9; font-weight: 700; display: block; }
    .hud-value { font-size: 1.5rem; font-weight: 900; color: #4a3f3a; }
    #hud-time.warn .hud-value { color: #e05656; }

    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; aspect-ratio: 1 / 1; }
    .hole {
      background: radial-gradient(ellipse at 50% 38%, #6b4a2f 0%, #543822 60%, #3d2817 100%);
      border-radius: 50%; position: relative; overflow: hidden; cursor: pointer;
      box-shadow: inset 0 -8px 14px rgba(0,0,0,.4), 0 4px 0 #4a8c70;
    }
    .hole::after { /* 地面のふち */
      content: ''; position: absolute; left: -6%; right: -6%; bottom: -2%; height: 36%;
      background: linear-gradient(#9bd99f, #7ac98a); border-radius: 50%; z-index: 1;
    }
    .critter {
      position: absolute; left: 50%; bottom: 4%; transform: translate(-50%, 110%);
      font-size: clamp(2rem, 13vw, 3.6rem); transition: transform .12s ease-out; z-index: 2; pointer-events: none;
    }
    .hole.up .critter { transform: translate(-50%, 6%); }
    .hole.bonk .critter { transform: translate(-50%, 30%) scale(.7) rotate(-12deg); opacity: .5; }
    .hit-float {
      position: absolute; left: 50%; top: 10%; transform: translateX(-50%);
      font-weight: 900; font-size: 1.4rem; z-index: 5; pointer-events: none;
      animation: floatUp .6s ease-out forwards;
    }
    @keyframes floatUp { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, -40px); } }

    /* ふたりモード */
    .vs-timer { font-weight: 900; font-size: 1.3rem; background: #fff; border-radius: 20px; padding: 6px 18px; margin: 8px 0; box-shadow: 0 4px 0 rgba(0,0,0,.08); }
    .vs-layout { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .vs-player { width: 100%; }
    .vs-score { text-align: center; font-weight: 900; font-size: 1.2rem; background: #fff; border-radius: 14px; padding: 6px; margin: 6px 0; box-shadow: 0 3px 0 rgba(0,0,0,.08); }
    .board-rotated { transform: rotate(180deg); }
    .board-small { gap: 8px; }

    /* 結果モーダル */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: center; justify-content: center; padding: 18px; }
    .modal.show { display: flex; }
    .modal-card { background: #fff; border-radius: 28px; padding: 30px 26px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,.3); animation: pop .35s cubic-bezier(.2,1.4,.5,1); }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-card h2 { font-size: 1.9rem; color: #ff8c2b; margin-bottom: 6px; }
    .modal-emoji { font-size: 3.6rem; }
    .result-row { display: flex; justify-content: space-around; margin: 16px 0; }
    .result-item { background: #fff6ec; border-radius: 16px; padding: 12px 10px; flex: 1; margin: 0 5px; }
    .result-item .r-label { font-size: .78rem; color: #b09; opacity: .7; display: block; }
    .result-item .r-label { color: #a98; }
    .result-item .r-value { font-size: 1.5rem; font-weight: 900; color: #4a3f3a; }
    .home-link { display: inline-block; margin-top: 14px; text-decoration: none; }

    @media (max-height: 700px) {
      body { justify-content: flex-start; }
      h1.title { font-size: 1.8rem; margin: 6px 0 4px; }
      .subtitle { margin-bottom: 12px; }
      .mole-emoji { font-size: 2.4rem; }
      .board { max-width: 62vh; }
      .vs-layout .board { max-width: 46vh; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- スタート画面 -->
    <section id="start-screen" class="screen active">
      <div class="mole-emoji">🐹</div>
      <h1 class="title">もぐらたたき！</h1>
      <p class="subtitle">あなから でてくる もぐらを<br>タップして やっつけよう！<br>💣ばくだんは たたいちゃ だめだよ</p>
      <button id="btn-start-solo" class="btn">ひとりで あそぶ</button>
      <button id="btn-start-vs" class="btn secondary">👫 ふたりで たいせん</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </section>

    <!-- ひとりプレイ画面 -->
    <section id="play-screen" class="screen">
      <div class="hud">
        <div class="hud-box"><span class="hud-label">てんすう</span><span id="hud-score" class="hud-value">0</span></div>
        <div class="hud-box" id="hud-time"><span class="hud-label">のこり</span><span id="hud-timer" class="hud-value">30</span></div>
      </div>
      <div id="board" class="board"></div>
    </section>

    <!-- ふたりプレイ画面 -->
    <section id="play-screen-vs" class="screen">
      <div class="vs-timer">⏱ <span id="vs-timer-value">60</span></div>
      <div class="vs-layout">
        <div class="vs-player vs-player-top">
          <div class="vs-score">2P てん <span id="score-p2">0</span></div>
          <div id="board-p2" class="board board-small board-rotated"></div>
        </div>
        <div class="vs-player vs-player-bottom">
          <div id="board-p1" class="board board-small"></div>
          <div class="vs-score">1P てん <span id="score-p1">0</span></div>
        </div>
      </div>
    </section>
  </div>

  <!-- 結果モーダル -->
  <div id="result-modal" class="modal">
    <div class="modal-card">
      <div class="modal-emoji" id="r-emoji">🎉</div>
      <h2 id="r-title">おわり！</h2>

      <div class="result-row" id="r-solo-row">
        <div class="result-item"><span class="r-label">てんすう</span><span id="r-score" class="r-value">0</span></div>
        <div class="result-item"><span class="r-label">ゲット⭐</span><span id="r-tokens" class="r-value">0</span></div>
      </div>

      <div class="result-row" id="r-vs-row" style="display:none;">
        <div class="result-item"><span class="r-label">1P てん</span><span id="r-score-p1" class="r-value">0</span></div>
        <div class="result-item"><span class="r-label">2P てん</span><span id="r-score-p2" class="r-value">0</span></div>
        <div class="result-item"><span class="r-label">ゲット⭐</span><span id="r-tokens-vs" class="r-value">0</span></div>
      </div>

      <button id="btn-again" class="btn">もういちど あそぶ</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </div>
  </div>

  <script src="../../js/store.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-log.js"></script>
  <script>
  (function () {
    'use strict';

    // もぐら盤面1つぶんのロジックをクラスに抽出（ひとり=1個、ふたり=2個 生成する）
    function MoleBoard(el) {
      this.el = el;
      this.score = 0;
      this.holes = [];
      this._build();
    }
    MoleBoard.prototype._build = function () {
      this.el.innerHTML = '';
      this.holes = [];
      for (var i = 0; i < 9; i++) {
        var hole = document.createElement('div');
        hole.className = 'hole';
        var critter = document.createElement('span');
        critter.className = 'critter';
        hole.appendChild(critter);
        hole.dataset.index = i;
        var self = this;
        (function (idx, holeEl) {
          holeEl.addEventListener('pointerdown', function () { self._onHit(idx, holeEl); });
        })(i, hole);
        this.el.appendChild(hole);
        this.holes.push({ el: hole, critter: critter, type: null });
      }
    };
    MoleBoard.prototype._onHit = function (idx, holeEl) {
      var h = this.holes[idx];
      if (!h.type) return;
      if (holeEl.classList.contains('bonk')) return;
      var delta = 0, text = '', color = '';
      if (h.type === 'bomb') { delta = -2; text = '-2'; color = '#e05656'; }
      else if (h.type === 'gold') { delta = 3; text = '+3'; color = '#e0a300'; }
      else { delta = 1; text = '+1'; color = '#3aa76d'; }
      this.score = Math.max(0, this.score + delta);
      this._float(holeEl, text, color);
      holeEl.classList.add('bonk');
      holeEl.classList.remove('up');
      h.type = null;
      if (this.onScore) this.onScore(this.score);
    };
    MoleBoard.prototype._float = function (holeEl, text, color) {
      var f = document.createElement('span');
      f.className = 'hit-float';
      f.textContent = text;
      f.style.color = color;
      holeEl.appendChild(f);
      setTimeout(function () { f.remove(); }, 600);
    };
    MoleBoard.prototype.freeIndexes = function () {
      var list = [];
      this.holes.forEach(function (h, i) {
        if (!h.type && !h.el.classList.contains('up')) list.push(i);
      });
      return list;
    };
    MoleBoard.prototype.spawnAt = function (idx, type) {
      var h = this.holes[idx];
      if (!h || h.type || h.el.classList.contains('up')) return false;
      h.type = type;
      h.critter.textContent = type === 'bomb' ? '💣' : type === 'gold' ? '🌟' : (Math.random() < 0.5 ? '🐹' : '🐭');
      h.el.classList.remove('bonk');
      h.el.classList.add('up');
      var self = this;
      var stay = 700 + Math.random() * 700;
      setTimeout(function () { self._hide(h); }, stay);
      return true;
    };
    MoleBoard.prototype._hide = function (h) {
      h.el.classList.remove('up');
      setTimeout(function () { h.type = null; h.el.classList.remove('bonk'); }, 150);
    };
    MoleBoard.prototype.reset = function () {
      this.score = 0;
      this.holes.forEach(function (h) { h.el.classList.remove('up', 'bonk'); h.type = null; });
    };

    /* ===================== ひとりプレイ ===================== */
    var GAME_TIME_SOLO = 30;
    var soloBoard = new MoleBoard(document.getElementById('board'));
    var soloSpawnTimer = null, soloCountdownTimer = null;
    var soloTimeLeft = GAME_TIME_SOLO;

    soloBoard.onScore = function (score) {
      document.getElementById('hud-score').textContent = score;
    };

    function soloPopUp() {
      var free = soloBoard.freeIndexes();
      if (!free.length) return;
      var idx = free[Math.floor(Math.random() * free.length)];
      var isBomb = Math.random() < 0.25;
      soloBoard.spawnAt(idx, isBomb ? 'bomb' : 'mole');
    }

    function startSolo() {
      clearInterval(soloSpawnTimer); clearInterval(soloCountdownTimer); // 念のため前回ぶんを掃除（冪等ガード）
      soloBoard.reset();
      soloTimeLeft = GAME_TIME_SOLO;
      document.getElementById('hud-score').textContent = 0;
      document.getElementById('hud-timer').textContent = soloTimeLeft;
      document.getElementById('hud-time').classList.remove('warn');
      show('play-screen');

      soloSpawnTimer = setInterval(function () {
        soloPopUp();
        if (Math.random() < 0.3) setTimeout(soloPopUp, 250);
      }, 850);

      soloCountdownTimer = setInterval(function () {
        soloTimeLeft--;
        document.getElementById('hud-timer').textContent = soloTimeLeft;
        if (soloTimeLeft <= 5) document.getElementById('hud-time').classList.add('warn');
        if (soloTimeLeft <= 0) endSolo();
      }, 1000);
    }

    function endSolo() {
      clearInterval(soloSpawnTimer);
      clearInterval(soloCountdownTimer);

      var finalScore = soloBoard.score;
      var earned = Math.ceil(finalScore / 5);
      soloBoard.reset();

      if (window.FireLog) FireLog.logSession('mole', finalScore, 0, earned);
      if (earned > 0 && window.Store) window.Store.addTokens(earned);

      document.getElementById('r-emoji').textContent = '🎉';
      document.getElementById('r-title').textContent = 'おわり！';
      document.getElementById('r-solo-row').style.display = '';
      document.getElementById('r-vs-row').style.display = 'none';
      document.getElementById('r-score').textContent = finalScore;
      document.getElementById('r-tokens').textContent = earned;
      currentMode = 'solo';
      document.getElementById('result-modal').classList.add('show');
    }

    /* ===================== ふたりプレイ ===================== */
    var GAME_TIME_VS = 60;
    var boardP1 = new MoleBoard(document.getElementById('board-p1'));
    var boardP2 = new MoleBoard(document.getElementById('board-p2'));
    var vsSpawnTimer = null, vsCountdownTimer = null;
    var vsTimeLeft = GAME_TIME_VS;

    boardP1.onScore = function (score) { document.getElementById('score-p1').textContent = score; };
    boardP2.onScore = function (score) { document.getElementById('score-p2').textContent = score; };

    function vsPopUp() {
      // 公平性のため、両盤面で「空いている」共通のマスだけを対象に、同じマス番号・同じ種別を同時出現させる
      var freeA = boardP1.freeIndexes();
      var freeBSet = {};
      boardP2.freeIndexes().forEach(function (i) { freeBSet[i] = true; });
      var freeBoth = freeA.filter(function (i) { return freeBSet[i]; });
      if (!freeBoth.length) return;
      var idx = freeBoth[Math.floor(Math.random() * freeBoth.length)];
      var r = Math.random();
      var type = r < 0.06 ? 'gold' : (r < 0.26 ? 'bomb' : 'mole');
      boardP1.spawnAt(idx, type);
      boardP2.spawnAt(idx, type);
    }

    function startVersus() {
      clearInterval(vsSpawnTimer); clearInterval(vsCountdownTimer); // 冪等ガード
      boardP1.reset();
      boardP2.reset();
      vsTimeLeft = GAME_TIME_VS;
      document.getElementById('score-p1').textContent = 0;
      document.getElementById('score-p2').textContent = 0;
      document.getElementById('vs-timer-value').textContent = vsTimeLeft;
      show('play-screen-vs');

      vsSpawnTimer = setInterval(function () {
        vsPopUp();
      }, 850);

      vsCountdownTimer = setInterval(function () {
        vsTimeLeft--;
        document.getElementById('vs-timer-value').textContent = vsTimeLeft;
        if (vsTimeLeft <= 0) endVersus();
      }, 1000);
    }

    function endVersus() {
      clearInterval(vsSpawnTimer);
      clearInterval(vsCountdownTimer);

      var scoreA = boardP1.score, scoreB = boardP2.score;
      boardP1.reset();
      boardP2.reset();

      var tokensA, tokensB, title;
      if (scoreA === scoreB) { tokensA = 2; tokensB = 2; title = 'ひきわけ！'; }
      else if (scoreA > scoreB) { tokensA = 3; tokensB = 1; title = '1P の かち！'; }
      else { tokensA = 1; tokensB = 3; title = '2P の かち！'; }
      var totalTokens = tokensA + tokensB; // Storeは共有ウォレットなので加算は1回だけ

      if (totalTokens > 0 && window.Store) window.Store.addTokens(totalTokens);
      if (window.FireLog) FireLog.logSession('mole-vs', Math.max(scoreA, scoreB), scoreA + scoreB, totalTokens);

      document.getElementById('r-emoji').textContent = scoreA === scoreB ? '🤝' : '🏆';
      document.getElementById('r-title').textContent = title;
      document.getElementById('r-solo-row').style.display = 'none';
      document.getElementById('r-vs-row').style.display = '';
      document.getElementById('r-score-p1').textContent = scoreA;
      document.getElementById('r-score-p2').textContent = scoreB;
      document.getElementById('r-tokens-vs').textContent = totalTokens;
      currentMode = 'vs';
      document.getElementById('result-modal').classList.add('show');
    }

    /* ===================== 共通 ===================== */
    var currentMode = 'solo';

    function show(id) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    document.getElementById('btn-start-solo').addEventListener('click', startSolo);
    document.getElementById('btn-start-vs').addEventListener('click', startVersus);
    document.getElementById('btn-again').addEventListener('click', function () {
      document.getElementById('result-modal').classList.remove('show');
      if (currentMode === 'vs') startVersus(); else startSolo();
    });
  })();
  </script>
  <a href="../../index.html" class="float-home-btn">🏠 HOME</a>
  <style>
  .float-home-btn {
    position: fixed; top: 10px; left: 10px; z-index: 9999;
    background: rgba(255,255,255,.88); border-radius: 50px;
    padding: 8px 14px; font-size: 1rem; font-weight: 900;
    color: #5a4632; text-decoration: none;
    box-shadow: 0 3px 10px rgba(0,0,0,.22); backdrop-filter: blur(4px);
    display: flex; align-items: center; gap: 4px;
    font-family: 'M PLUS Rounded 1c', Arial, sans-serif;
    transition: opacity .15s;
  }
  .float-home-btn:hover, .float-home-btn:active { opacity: .7; }
  </style>
</body>
</html>
