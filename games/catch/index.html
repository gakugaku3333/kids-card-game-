<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="子供向けのフルーツキャッチゲーム。カゴを動かしてフルーツをうけとめよう！">
  <title>フルーツキャッチ！</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/images/favicon-16x16.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: linear-gradient(160deg, #ffe0a3 0%, #ffd089 45%, #ffb84d 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      min-height: 100%; overflow-y: auto; padding: 18px; color: #5a4632;
      user-select: none; -webkit-user-select: none;
    }
    .game-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    h1.title { font-weight: 900; font-size: 2.3rem; color: #fff; text-shadow: 0 3px 0 #e8902a, 0 6px 8px rgba(0,0,0,.18); margin: 14px 0 6px; text-align: center; }
    .subtitle { font-size: 1.05rem; color: #9a5e1e; font-weight: 700; margin-bottom: 22px; text-align: center; line-height: 1.7; }
    .big-emoji { font-size: 3.4rem; }

    .btn {
      font-family: inherit; font-weight: 900; border: none; cursor: pointer;
      border-radius: 22px; padding: 16px 34px; font-size: 1.3rem; color: #fff;
      background: linear-gradient(#ff7a59, #ff5a3d); box-shadow: 0 5px 0 #d9402a, 0 8px 12px rgba(0,0,0,.18);
      transition: transform .08s, box-shadow .08s; margin: 8px;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d9402a; }
    .btn.secondary { background: linear-gradient(#9bd4ff, #6bb8f5); box-shadow: 0 5px 0 #4a90d9, 0 8px 12px rgba(0,0,0,.18); }
    .btn.secondary:active { box-shadow: 0 1px 0 #4a90d9; }
    .home-link { display: inline-block; margin-top: 14px; text-decoration: none; }

    .hud { display: flex; gap: 12px; width: 100%; justify-content: space-between; margin-bottom: 12px; }
    .hud-box { background: #fff; border-radius: 18px; padding: 8px 6px; flex: 1; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,.08); }
    .hud-label { font-size: .78rem; color: #b89; font-weight: 700; display: block; }
    .hud-value { font-size: 1.4rem; font-weight: 900; color: #5a4632; }

    .stage {
      position: relative; width: 100%; aspect-ratio: 3 / 4; max-height: 70vh;
      background: linear-gradient(#bfe9ff 0%, #e8f9ff 70%, #cdeecb 70%, #aadfa6 100%);
      border-radius: 22px; overflow: hidden; box-shadow: inset 0 0 0 4px rgba(255,255,255,.5), 0 6px 14px rgba(0,0,0,.15);
      touch-action: none; cursor: pointer;
    }
    .falling { position: absolute; font-size: 2.4rem; will-change: transform; pointer-events: none; line-height: 1; }
    .basket { position: absolute; bottom: 4px; font-size: 3rem; transform: translateX(-50%); pointer-events: none; transition: transform .04s linear; z-index: 3; }
    .pop-float { position: absolute; font-weight: 900; font-size: 1.2rem; pointer-events: none; z-index: 4; animation: floatUp .5s ease-out forwards; }
    @keyframes floatUp { from { opacity: 1; } to { opacity: 0; transform: translateY(-26px); } }
    .lives { font-size: 1.3rem; letter-spacing: 2px; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: center; justify-content: center; padding: 18px; }
    .modal.show { display: flex; }
    .modal-card { background: #fff; border-radius: 28px; padding: 30px 26px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,.3); animation: pop .35s cubic-bezier(.2,1.4,.5,1); }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-card h2 { font-size: 1.9rem; color: #ff5a3d; margin-bottom: 6px; }
    .modal-emoji { font-size: 3.6rem; }
    .result-row { display: flex; justify-content: space-around; margin: 16px 0; }
    .result-item { background: #fff3ec; border-radius: 16px; padding: 12px 10px; flex: 1; margin: 0 5px; }
    .result-item .r-label { font-size: .78rem; color: #a98; display: block; }
    .result-item .r-value { font-size: 1.5rem; font-weight: 900; color: #5a4632; }

    @media (max-height: 700px) {
      h1.title { font-size: 1.7rem; margin: 6px 0 4px; }
      .subtitle { margin-bottom: 12px; }
      .big-emoji { font-size: 2.4rem; }
      .stage { aspect-ratio: auto; height: 58vh; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <section id="start-screen" class="screen active">
      <div class="big-emoji">🍎🧺🍓</div>
      <h1 class="title">フルーツキャッチ！</h1>
      <p class="subtitle">カゴを うごかして<br>おちてくる フルーツを うけとめよう！<br>💣ばくだんに きをつけてね</p>
      <button id="btn-start" class="btn">スタート！</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </section>

    <section id="play-screen" class="screen">
      <div class="hud">
        <div class="hud-box"><span class="hud-label">とった</span><span id="hud-score" class="hud-value">0</span></div>
        <div class="hud-box"><span class="hud-label">いのち</span><span id="hud-lives" class="hud-value lives">❤️❤️❤️</span></div>
      </div>
      <div id="stage" class="stage">
        <div id="basket" class="basket">🧺</div>
      </div>
    </section>
  </div>

  <div id="result-modal" class="modal">
    <div class="modal-card">
      <div class="modal-emoji">🎉</div>
      <h2>おわり！</h2>
      <div class="result-row">
        <div class="result-item"><span class="r-label">とったかず</span><span id="r-score" class="r-value">0</span></div>
        <div class="result-item"><span class="r-label">ゲット⭐</span><span id="r-tokens" class="r-value">0</span></div>
      </div>
      <button id="btn-again" class="btn">もういちど あそぶ</button>
      <a href="../../index.html" class="btn secondary home-link">🏠 メニューにもどる</a>
    </div>
  </div>

  <script src="../../js/store.js"></script>
  <script>
  (function () {
    'use strict';
    var stage = document.getElementById('stage');
    var basket = document.getElementById('basket');
    var FRUITS = ['🍎', '🍓', '🍌', '🍊', '🍇', '🍑', '🍒', '🍉'];

    var basketX = 0.5;     // 0〜1 の比率位置
    var items = [];        // {el, x, y, vy, type}
    var score = 0, lives = 3, running = false;
    var rafId = null, spawnTimer = null, lastTime = 0, spawnGap = 900, sinceSpawn = 0;
    var W = 0, H = 0;

    function measure() { W = stage.clientWidth; H = stage.clientHeight; }

    function setBasket(ratio) {
      basketX = Math.max(0.06, Math.min(0.94, ratio));
      basket.style.left = (basketX * 100) + '%';
    }

    function pointerMove(e) {
      if (!running) return;
      var rect = stage.getBoundingClientRect();
      var cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      setBasket(cx / rect.width);
    }
    stage.addEventListener('pointerdown', pointerMove);
    stage.addEventListener('pointermove', function (e) { if (e.buttons || e.pointerType !== 'mouse') pointerMove(e); });
    document.addEventListener('keydown', function (e) {
      if (!running) return;
      if (e.key === 'ArrowLeft') setBasket(basketX - 0.08);
      if (e.key === 'ArrowRight') setBasket(basketX + 0.08);
    });

    function spawn() {
      var isBomb = Math.random() < 0.18;
      var el = document.createElement('div');
      el.className = 'falling';
      el.textContent = isBomb ? '💣' : FRUITS[Math.floor(Math.random() * FRUITS.length)];
      stage.appendChild(el);
      items.push({ el: el, x: 0.08 + Math.random() * 0.84, y: -0.08, vy: 0.18 + Math.random() * 0.14, type: isBomb ? 'bomb' : 'fruit' });
    }

    function showFloat(xRatio, yRatio, text, color) {
      var f = document.createElement('div');
      f.className = 'pop-float';
      f.textContent = text; f.style.color = color;
      f.style.left = (xRatio * 100) + '%'; f.style.top = (yRatio * 100) + '%';
      stage.appendChild(f);
      setTimeout(function () { f.remove(); }, 500);
    }

    function loop(t) {
      if (!running) return;
      if (!lastTime) lastTime = t;
      var dt = Math.min(0.05, (t - lastTime) / 1000);
      lastTime = t;
      sinceSpawn += dt * 1000;
      if (sinceSpawn >= spawnGap) { sinceSpawn = 0; spawn(); if (spawnGap > 480) spawnGap -= 12; }

      var catchY = 0.86; // カゴの高さ（比率）
      for (var i = items.length - 1; i >= 0; i--) {
        var it = items[i];
        it.y += it.vy * dt;
        it.el.style.transform = 'translate(' + (it.x * W - it.el.offsetWidth / 2) + 'px,' + (it.y * H) + 'px)';

        // キャッチ判定
        if (it.y >= catchY && it.y <= catchY + 0.12) {
          if (Math.abs(it.x - basketX) < 0.12) {
            if (it.type === 'fruit') { score++; showFloat(it.x, catchY, '+1', '#2faa55'); }
            else { lives--; showFloat(it.x, catchY, '💥', '#e05656'); updateLives(); if (lives <= 0) { endGame(); } }
            it.el.remove(); items.splice(i, 1);
            updateScore();
            continue;
          }
        }
        // 画面外に落ちた
        if (it.y > 1.1) {
          if (it.type === 'fruit') { lives--; updateLives(); if (lives <= 0) { it.el.remove(); items.splice(i, 1); endGame(); break; } }
          it.el.remove(); items.splice(i, 1);
        }
      }
      rafId = requestAnimationFrame(loop);
    }

    function updateScore() { document.getElementById('hud-score').textContent = score; }
    function updateLives() {
      var s = '';
      for (var i = 0; i < Math.max(0, lives); i++) s += '❤️';
      document.getElementById('hud-lives').textContent = s || '💀';
    }

    function clearItems() { items.forEach(function (it) { it.el.remove(); }); items = []; }

    function startGame() {
      cancelAnimationFrame(rafId); // 念のため前回ループを停止
      clearItems();
      score = 0; lives = 3; running = true; spawnGap = 900; sinceSpawn = 0; lastTime = 0;
      updateScore(); updateLives();
      show('play-screen');
      measure(); setBasket(0.5);
      rafId = requestAnimationFrame(loop);
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(rafId);
      clearItems();
      var earned = Math.ceil(score / 4);
      if (earned > 0 && window.Store) window.Store.addTokens(earned);
      document.getElementById('r-score').textContent = score;
      document.getElementById('r-tokens').textContent = earned;
      document.getElementById('result-modal').classList.add('show');
    }

    function show(id) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    window.addEventListener('resize', function () { if (running) measure(); });
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-again').addEventListener('click', function () {
      document.getElementById('result-modal').classList.remove('show');
      startGame();
    });
  })();
  </script>
</body>
</html>
