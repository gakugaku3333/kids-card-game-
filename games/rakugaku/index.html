<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズへ うつります...</title>
</head>
<body>
  <p>クイズへ うつります...</p>
  <script>
    // 旧URL（?mode=katakana / ?math=xxx / ?mode=fb-review）互換リダイレクト。
    // 実体は games/quiz/ のデータ駆動クイズエンジンに統合済み。
    var params = new URLSearchParams(window.location.search);
    var mode = params.get('mode');
    var math = params.get('math');
    var dest = '../quiz/index.html';

    if (mode === 'katakana') dest += '?set=katakana';
    else if (mode === 'fb-review') dest += '?mode=fb-review';
    else if (math) dest += '?set=math-' + math;
    else dest = '../../index.html';

    window.location.replace(dest);
  </script>
</body>
</html>
